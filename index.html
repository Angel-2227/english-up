<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Up!</title>
  <meta name="description" content="Your personal English learning platform" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#e8a045" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet" />

  <!-- CSS base -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/teacher.css" />
  <link rel="stylesheet" href="css/lesson.css" />
  <link rel="stylesheet" href="css/missions.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <!-- Dark mode — después de todo para máxima especificidad -->
  <link rel="stylesheet" href="css/dark.css" />
  <!-- UI del selector de temáticas -->
  <link rel="stylesheet" href="css/skins-ui.css" />
  <!-- Print — solo al imprimir -->
  <link rel="stylesheet" href="css/print.css" media="print" />
  <!--
    Los CSS de temáticas (valentine.css, etc.) se cargan
    dinámicamente por theme.js según la temática activa.
    No se incluyen aquí para no penalizar el rendimiento.
  -->

  <!--
    Anti-flash: aplicar tema Y skin guardados antes de pintar.
    Debe estar en <head> para ejecutarse antes del first paint.
  -->
  <script>
    (function() {
      try {
        // Dark/light
        var t = localStorage.getItem("eu_theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
        // Skin: solo aplicar el data-skin ahora; el CSS lo carga theme.js
        // No aplicamos el data-skin aquí porque el CSS aún no está cargado.
        // theme.js lo hace en initTheme() antes del DOMContentLoaded.
      } catch(e) {}
    })();
  </script>
</head>

<body>

  <!-- ═══════════════════════════════════════
       LOADING SCREEN
  ═══════════════════════════════════════ -->
  <div id="loading-screen" class="screen screen-loading">
    <div class="loading-inner">
      <div class="loading-logo">
        <span class="loading-emoji">📚</span>
        <span class="loading-wordmark">English <em>Up!</em></span>
      </div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       LOGIN SCREEN
  ═══════════════════════════════════════ -->
  <div id="login-screen" class="screen screen-login hidden">
    <div class="login-bg">
      <div class="login-blob login-blob-1"></div>
      <div class="login-blob login-blob-2"></div>
      <div class="login-blob login-blob-3"></div>
    </div>

    <!-- Toggle de tema en la pantalla de login -->
    <button id="theme-toggle-btn-login"
            class="theme-toggle-btn"
            data-theme-toggle
            style="position:absolute;top:1rem;right:1rem;z-index:10;"
            aria-label="Modo oscuro"
            title="Modo oscuro">
      <span class="icon-dark">🌙</span>
      <span class="icon-light">☀️</span>
    </button>

    <div class="login-card">
      <div class="login-header">
        <span class="login-emoji">📚</span>
        <h1>English <em>Up!</em></h1>
        <p>Your journey to fluency starts here</p>
      </div>
      <button id="btn-google-login" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
        Continue with Google
      </button>
      <p id="login-error" class="login-error hidden"></p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       PENDING APPROVAL SCREEN
  ═══════════════════════════════════════ -->
  <div id="pending-screen" class="screen screen-pending hidden">
    <div class="pending-card">
      <div class="pending-icon">⏳</div>
      <h2>Waiting for approval</h2>
      <p>Your teacher will give you access soon. Check back in a moment!</p>
      <p id="pending-email" class="pending-email"></p>
      <button id="btn-logout-pending" class="btn btn-ghost">Sign out</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       MAIN APP
  ═══════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
      <button class="nav-logo" id="btn-nav-home" aria-label="Go home">
        <span>📚</span>
        <span class="nav-wordmark">English <em>Up!</em></span>
      </button>

      <!-- Student nav -->
      <div class="nav-links" id="nav-links-student">
        <button class="nav-link active" data-route="home">My Path</button>
        <button class="nav-link" data-route="missions">🎯 Missions</button>
      </div>

      <!-- Teacher nav -->
      <div class="nav-links hidden" id="nav-links-teacher">
        <button class="nav-link" data-route="home">My Path</button>
        <button class="nav-link" data-route="missions">🎯 Missions</button>
        <button class="nav-link" data-route="teacher">Teacher Panel</button>
      </div>

      <div class="nav-right">
        <!-- XP pill -->
        <div class="nav-xp-pill" id="nav-xp-pill">
          <span class="nav-xp-icon">⚡</span>
          <span id="nav-xp">0</span>
        </div>
        <!-- Streak pill -->
        <div class="nav-streak-pill" id="nav-streak-pill">
          <span>🔥</span>
          <span id="nav-streak">0</span>
        </div>

        <!-- Selector de temáticas (abre modal) 
        <button class="theme-toggle-btn"
                data-skin-selector
                aria-label="Cambiar temática"
                title="Temáticas">
          🎨
        </button>-->

        <!-- Dark / Light toggle -->
        <button class="theme-toggle-btn"
                data-theme-toggle
                aria-label="Modo oscuro"
                title="Modo oscuro">
          <span class="icon-dark">🌙</span>
          <span class="icon-light">☀️</span>
        </button>

        <!-- Avatar -->
        <button class="nav-avatar-btn" id="nav-avatar-btn" aria-label="Profile">
          <img id="nav-avatar" src="" alt="avatar" class="nav-avatar-img" />
        </button>
        <!-- Profile dropdown -->
        <div class="nav-dropdown hidden" id="nav-dropdown">
          <div class="nav-dropdown-header">
            <strong id="dd-name"></strong>
            <span id="dd-email"></span>
          </div>
          <button class="dd-item" id="dd-profile">👤 My Profile</button>
          <button class="dd-item" id="dd-avatar">🎨 Change Avatar</button>
          <button class="dd-item" data-skin-selector>✨ Temáticas</button>
          <button class="dd-item" id="btn-logout">🚪 Sign out</button>
        </div>
      </div>
    </nav>

    <!-- BOTTOM NAV (mobile only) -->
    <nav class="bottom-nav" id="bottom-nav" aria-label="Mobile navigation">
      <button class="bottom-nav-item active" data-route="home" id="bnav-home">
        <span class="bottom-nav-icon">🏠</span>
        <span class="bottom-nav-label">My Path</span>
      </button>
      <button class="bottom-nav-item" data-route="missions" id="bnav-missions">
        <span class="bottom-nav-icon">🎯</span>
        <span class="bottom-nav-label">Missions</span>
      </button>
      <!-- Teacher only -->
      <button class="bottom-nav-item hidden" data-route="teacher" id="bnav-teacher">
        <span class="bottom-nav-icon">🏫</span>
        <span class="bottom-nav-label">Teacher</span>
      </button>
      <!-- Botón para temáticas + dark mode en móvil -->
      <button class="bottom-nav-item" id="bnav-theme-btn" data-skin-selector>
        <span class="bottom-nav-icon" style="font-size:1.35rem">🎨</span>
        <span class="bottom-nav-label">Temas</span>
      </button>
      <button class="bottom-nav-item" id="bnav-profile-btn">
        <span class="bottom-nav-icon">
          <img id="bnav-avatar" src="" alt="avatar" class="bnav-avatar-img" />
        </span>
        <span class="bottom-nav-label">Profile</span>
      </button>
    </nav>

    <!-- PAGE CONTAINER -->
    <main class="page-container" id="page-container">
      <!-- Pages are rendered here by JS -->
    </main>

  </div>

  <!-- ═══════════════════════════════════════
       MODAL OVERLAY
  ═══════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box">
      <!-- content injected by JS -->
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       TOAST
  ═══════════════════════════════════════ -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ═══════════════════════════════════════
       AI CHAT WIDGET
  ═══════════════════════════════════════ -->
  <button id="ai-fab" class="ai-fab hidden" aria-label="Open AI assistant">
    <span>🤖</span>
  </button>
  <div id="ai-panel" class="ai-panel hidden">
    <div class="ai-panel-header">
      <div class="ai-panel-title">
        <span class="ai-avatar-icon">🤖</span>
        <div>
          <div class="ai-name">English Up! AI</div>
          <div class="ai-status" id="ai-status">Ready to help</div>
        </div>
      </div>
      <div class="ai-panel-controls">
        <button class="ai-lang-btn" id="ai-lang-toggle" title="Switch language">🌐 EN</button>
        <button class="ai-close-btn" id="ai-close" aria-label="Close">✕</button>
      </div>
    </div>
    <div class="ai-messages" id="ai-messages"></div>
    <div class="ai-input-row">
      <input id="ai-input" class="ai-input" type="text" placeholder="Ask me anything…" autocomplete="off" />
      <button id="ai-send" class="ai-send-btn" aria-label="Send">➤</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       BOOTSTRAP — theme.js primero, luego app.js
  ═══════════════════════════════════════ -->
  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
